<!DOCTYPE html>
<html>
<head>
<title>Untuk Kamu</title>

<style>
body{
background: linear-gradient(120deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
text-align:center;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4d6d;
cursor:pointer;
}

img{
margin-top:20px;
width:200px;
border-radius:15px;
display:none;
}
</style>
</head>

<body>

<h1>💗 Hai Cantik 💗</h1>

<button onclick="mulai()">PENCET YUKS</button>

<p id="teks" style="display:none">
Maafin aku ya udah ngomong yang ga pantes ke kamu.
Aku bener-bener minta maaf dan ga ada niat nyakitin kamu.
I love you ❤️
</p>

<img src="foto.jpg">

<audio id="musik">
<source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>
function mulai(){
document.getElementById("teks").style.display="block";
document.querySelector("img").style.display="block";
document.getElementById("musik").play();
}
</script>

</body>
</html>
