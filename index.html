<!DOCTYPE html>
<html>
<head>
<title>Untuk Kamu</title>

<style>

body{
background: linear-gradient(120deg,#ff9a9e,#9e4ba3);
text-align:center;
font-family: Arial;
color:white;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:45px;
}

img{
width:250px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px white;
}

#pesan{
margin-top:30px;
font-size:22px;
opacity:0;
transition:1s;
}

button{
margin-top:30px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4d6d;
cursor:pointer;
}

.heart{
position:fixed;
top:-10px;
font-size:25px;
animation:jatuh 6s linear infinite;
}

@keyframes jatuh{
0%{transform:translateY(-10px);}
100%{transform:translateY(100vh);}
}

</style>

</head>

<body>

<h1>💗 Hai Cantik 💗</h1>

<img src="foto.jpg">

<br>

<button onclick="mulai()">KLIK INI YA👀</button>

<div id="pesan">
MAAFFIN AKU YA UDAH NGOMONG YANG GA PANTES KE KAMU DAN JUJUR AKU GA ADA NIATAN SAMA SEKALI UNTUK BILANG KAMU KAYAK GITU, AKU NGAKU SALAH DAN MINTA MAAF BANGET KE KAMU KARENA UDAH BUAT HATI KAMU SAKIT, I LOVE U SAYANG❤️.
</div>

<audio id="musik" loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>

function mulai(){
document.getElementById("musik").play();
document.getElementById("pesan").style.opacity="1";
}

setInterval(function(){
let heart=document.createElement("div");
heart.innerHTML="❤️🥹";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},6000);

},300);

</script>

</body>
</html>
